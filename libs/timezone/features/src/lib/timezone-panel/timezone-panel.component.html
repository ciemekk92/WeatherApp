<div class="timezone-panel">
  <div class="timezone-panel__header">Timezone</div>
  <ul class="timezone-panel__details">
    <li>📍 Name: <strong>{{ data().location.name }}</strong></li>
    <li>🌍 Region: <strong>{{ data().location.region }}</strong></li>
    <li>🏳️ Country: <strong>{{ data().location.country }}</strong></li>
    <li>🕐 Timezone: <strong>{{ data().location.tzId }}</strong></li>
  </ul>
</div>
