<div class="home">
  <section class="home__selection">
    <lib-home-features-data-selection (dataFetched)="onDataFetched($event)" />
  </section>

  @if (isLoading()) {
    <lib-shared-ui-loader [loading]="isLoading()" />
  } @else {
    @if (currentWeatherData(); as data) {
      <section class="home__results">
        <div class="home__panel">
          <lib-weather-features-weather-panel [data]="data" />
        </div>
        <div class="home__additional-info">
          <lib-home-features-weather-additional-info [data]="data" />
        </div>
      </section>
    }

    @if (currentAstronomyData(); as data) {
      <section class="home__results">
        <div class="home__panel">
          <lib-astronomy-features-astronomy-panel [data]="data" />
        </div>
        <div class="home__additional-info">
          <lib-home-features-astronomy-additional-info [data]="data" />
        </div>
      </section>
    }

    @if (currentTimezoneData(); as data) {
      <section class="home__results">
        <div class="home__panel">
          <lib-timezone-features-timezone-panel [data]="data" />
        </div>
        <div class="home__additional-info">
          <lib-home-features-timezone-additional-info [data]="data" />
        </div>
      </section>
    }
  }
</div>
